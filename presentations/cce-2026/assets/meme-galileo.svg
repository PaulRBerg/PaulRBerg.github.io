<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" role="img" aria-label="Meme placeholder: Galileo - eppur si muove vs the church - this is fine">
  <rect width="1100" height="700" fill="#faf9f5"/>

  <!-- top panel: Galileo -->
  <g transform="translate(40 40)">
    <rect x="0" y="0" width="1020" height="290" rx="14" fill="#fff" stroke="#0c0c1c" stroke-width="3"/>
    <circle cx="160" cy="145" r="90" fill="#e7d8b8" stroke="#0c0c1c" stroke-width="3"/>
    <path d="M 110 130 Q 120 110 150 110 Q 175 105 200 120 Q 215 130 215 150 Q 215 170 200 180 Q 180 190 150 188 Q 120 184 110 170 Z" fill="#3d3322"/>
    <ellipse cx="148" cy="155" rx="3" ry="4" fill="#0c0c1c"/>
    <ellipse cx="178" cy="155" rx="3" ry="4" fill="#0c0c1c"/>
    <path d="M 140 175 Q 162 184 184 175" fill="none" stroke="#0c0c1c" stroke-width="2"/>
    <!-- telescope -->
    <rect x="220" y="160" width="120" height="14" rx="3" fill="#5b21b6" stroke="#0c0c1c" stroke-width="2"/>

    <text x="380" y="100" font-family="'Crimson Pro', Georgia, serif" font-style="italic" font-size="48" fill="#0c0c1c">"E pur si muove."</text>
    <text x="380" y="160" font-family="Inter, sans-serif" font-size="22" fill="#0c0c1c" opacity="0.7">— Galileo, 1633 (allegedly), explaining heliocentrism</text>
    <text x="380" y="220" font-family="Inter, sans-serif" font-size="22" fill="#0c0c1c">a rational meme inviting criticism, evidence, error correction.</text>
  </g>

  <!-- bottom panel: The Church -->
  <g transform="translate(40 360)">
    <rect x="0" y="0" width="1020" height="290" rx="14" fill="#fdecec" stroke="#0c0c1c" stroke-width="3"/>
    <g transform="translate(160 145)">
      <!-- bishop hat silhouette -->
      <path d="M -50 0 Q -50 -85 0 -90 Q 50 -85 50 0 Z" fill="#dc2626" stroke="#0c0c1c" stroke-width="3"/>
      <circle cx="0" cy="35" r="50" fill="#e7d8b8" stroke="#0c0c1c" stroke-width="3"/>
      <ellipse cx="-14" cy="35" rx="3" ry="4" fill="#0c0c1c"/>
      <ellipse cx="14" cy="35" rx="3" ry="4" fill="#0c0c1c"/>
      <path d="M -16 56 Q 0 49 16 56" fill="none" stroke="#0c0c1c" stroke-width="2"/>
    </g>
    <text x="380" y="100" font-family="'Crimson Pro', Georgia, serif" font-style="italic" font-size="48" fill="#0c0c1c">"This is fine."</text>
    <text x="380" y="160" font-family="Inter, sans-serif" font-size="22" fill="#0c0c1c" opacity="0.7">— The anti-rational meme du jour, 1633</text>
    <text x="380" y="220" font-family="Inter, sans-serif" font-size="22" fill="#0c0c1c">resist criticism. suppress evidence. self-replicate via coercion.</text>
  </g>

  <!-- badge -->
  <g transform="translate(40 6)">
    <text x="0" y="22" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#5b21b6" letter-spacing="0.22em" font-weight="600">MEME · PLACEHOLDER · GALILEO</text>
  </g>
</svg>
