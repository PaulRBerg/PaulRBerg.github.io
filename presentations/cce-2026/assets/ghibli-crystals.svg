<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Ghibli placeholder: crystalline knowledge structures growing across parallel branches">
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1330"/>
      <stop offset="55%" stop-color="#3a2a6e"/>
      <stop offset="100%" stop-color="#9d7bd2"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff7c2" stop-opacity="0.85"/>
      <stop offset="80%" stop-color="#fff7c2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="crystal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="800" fill="url(#sky2)"/>

  <!-- stars / quanta -->
  <g fill="#fff7c2" opacity="0.9">
    <circle cx="100" cy="120" r="1.6"/>
    <circle cx="200" cy="220" r="1.2"/>
    <circle cx="320" cy="80" r="1.8"/>
    <circle cx="450" cy="180" r="1.0"/>
    <circle cx="560" cy="120" r="1.4"/>
    <circle cx="700" cy="60" r="1.2"/>
    <circle cx="850" cy="180" r="1.8"/>
    <circle cx="980" cy="100" r="1.0"/>
    <circle cx="1080" cy="230" r="1.6"/>
    <circle cx="160" cy="380" r="1.0"/>
    <circle cx="1130" cy="430" r="1.2"/>
  </g>

  <!-- moon / halo -->
  <circle cx="950" cy="220" r="220" fill="url(#halo)"/>
  <circle cx="950" cy="220" r="60" fill="#fff7c2" opacity="0.9"/>

  <!-- multiverse branch lines (converging) -->
  <g stroke="#fef3c7" stroke-width="1.2" fill="none" opacity="0.55" stroke-linecap="round">
    <path d="M 0 760 C 280 700 480 660 600 560"/>
    <path d="M 120 800 C 320 720 520 660 600 560"/>
    <path d="M 1200 760 C 920 700 720 660 600 560"/>
    <path d="M 1080 800 C 880 720 700 660 600 560"/>
    <path d="M 600 800 L 600 560"/>
  </g>

  <!-- crystals -->
  <g transform="translate(600 560)">
    <polygon points="0,-220 70,-60 0,80 -70,-60" fill="url(#crystal)" stroke="#fef3c7" stroke-width="2" opacity="0.95"/>
    <polygon points="-160,-30 -100,-150 -40,-60 -100,30" fill="url(#crystal)" stroke="#fef3c7" stroke-width="1.5" opacity="0.85"/>
    <polygon points="160,-30 100,-150 40,-60 100,30" fill="url(#crystal)" stroke="#fef3c7" stroke-width="1.5" opacity="0.85"/>
    <polygon points="-120,80 -60,40 0,90 -60,160" fill="url(#crystal)" stroke="#fef3c7" stroke-width="1.5" opacity="0.78"/>
    <polygon points="120,80 60,40 0,90 60,160" fill="url(#crystal)" stroke="#fef3c7" stroke-width="1.5" opacity="0.78"/>
  </g>

  <!-- foreground hill -->
  <path d="M 0 720 Q 300 660 600 700 T 1200 720 L 1200 800 L 0 800 Z" fill="#1a1330" opacity="0.85"/>

  <!-- placeholder badge -->
  <g transform="translate(60 60)">
    <rect x="0" y="0" width="280" height="42" rx="21" fill="#fef3c7" fill-opacity="0.95"/>
    <text x="22" y="27" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#1a1330" letter-spacing="0.12em">GHIBLI · PLACEHOLDER · 02</text>
  </g>
  <text x="60" y="138" font-family="'Crimson Pro', Georgia, serif" font-size="34" fill="#fef3c7" font-style="italic">"abstract multiversal crystals — branches converging on the truth"</text>
  <text x="60" y="168" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#fef3c7" opacity="0.85">replace with: ./assets/ghibli-crystals.{png|jpg}</text>
</svg>
